spring:
  application:
    name: mini-projet-s6

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/mini_projet_s6}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

server:
  port: ${SERVER_PORT:8080}
