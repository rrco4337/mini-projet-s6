version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-projet-s6-postgres
    environment:
      POSTGRES_DB: mini_projet_s6
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./bd/base.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-projet-s6-app
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mini_projet_s6
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - app_logs:/app/logs

  # Service utilitaire pour l'initialisation
  init:
    image: postgres:16-alpine
    container_name: mini-projet-s6-init
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./init-data.sql:/init-data.sql:ro
    command: >
      sh -c "
        echo 'Création du hash admin...' &&
        psql -h postgres -U postgres -d mini_projet_s6 -c \"UPDATE users SET password_hash = '\\$$2a\\$$10\\$$cZjDNEqOn3IO2Ua8edEg9eVYyPf0ZR0nEw1TCYJ0s38C20xftPf0O' WHERE username = 'admin';\" &&
        echo 'Initialisation terminée!'
      "
    restart: "no"

volumes:
  postgres_data:
  app_logs:

networks:
  app-network:
    driver: bridge